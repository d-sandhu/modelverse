services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: modelverse
      POSTGRES_USER: modelverse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: [CMD-SHELL, pg_isready -U modelverse -d modelverse]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://modelverse:${POSTGRES_PASSWORD}@postgres:5432/modelverse
      CORS_ORIGIN: ${PUBLIC_ORIGIN:?set PUBLIC_ORIGIN}
      LOG_LEVEL: info
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: [CMD, wget, -qO-, http://127.0.0.1:3001/health]
      interval: 10s
      timeout: 3s
      retries: 6
    restart: unless-stopped
  caddy:
    build:
      context: ..
      dockerfile: infra/Dockerfile.caddy
    ports: [80:80, 443:443]
    depends_on:
      api: { condition: service_healthy }
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
volumes:
  postgres-data:
  caddy-data:
  caddy-config:
